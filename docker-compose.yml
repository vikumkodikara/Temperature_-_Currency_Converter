name: converter-app

services:
  # ============================================
  # Temperature Database (host port 27018)
  # ============================================
  temp-mongodb:
    image: mongo:7.0
    container_name: temp-mongodb
    ports:
      - "27018:27017"
    volumes:
      - temp-mongo-data:/data/db
    networks:
      - converter-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Currency Database (host port 27017)
  # ============================================
  currency-mongodb:
    image: mongo:7.0
    container_name: currency-mongodb
    ports:
      - "27017:27017"
    volumes:
      - currency-mongo-data:/data/db
    networks:
      - converter-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Temperature Converter — Spring Boot (port 8081)
  # ============================================
  temp-converter:
    build:
      context: ./tempconv
      dockerfile: Dockerfile
    container_name: temp-converter
    entrypoint: [ "java", "-jar", "app.jar" ]
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: mongodb://temp-mongodb:27017/temp_db
      SPRING_DATA_MONGODB_URI: mongodb://temp-mongodb:27017/temp_db
      MONGODB_HOST: temp-mongodb
      MONGODB_PORT: 27017
    depends_on:
      temp-mongodb:
        condition: service_healthy
    networks:
      - converter-network

  # ============================================
  # Currency Converter — Spring Boot (port 8082)
  # ============================================
  currency-converter:
    build:
      context: ./currencyconvertor
      dockerfile: Dockerfile
    container_name: currency-converter
    entrypoint: [ "java", "-jar", "app.jar" ]
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://currency-mongodb:27017/currency_db
      SPRING_DATA_MONGODB_URI: mongodb://currency-mongodb:27017/currency_db
      MONGODB_HOST: currency-mongodb
      MONGODB_PORT: 27017
    depends_on:
      currency-mongodb:
        condition: service_healthy
    networks:
      - converter-network

  # ============================================
  # Frontend — Nginx (port 80)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: converter-frontend
    ports:
      - "80:80"
    depends_on:
      - temp-converter
      - currency-converter
    networks:
      - converter-network

# ============================================
# Persistent volumes
# ============================================
volumes:
  temp-mongo-data:
  currency-mongo-data:

# ============================================
# Custom network for inter-container comms
# ============================================
networks:
  converter-network:
    driver: bridge
