server {
    listen 80;
    server_name localhost;

    # Serve frontend static files — always send fresh, never cache
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # Prevent browser from caching HTML, JS, CSS so updates show immediately
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Reverse proxy: Temperature Converter API
    location /api/temperatures/ {
        proxy_pass http://temp-converter:8081/api/temperatures/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy: Currency Converter API
    location /api/currency/ {
        proxy_pass http://currency-converter:8082/api/currency/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
